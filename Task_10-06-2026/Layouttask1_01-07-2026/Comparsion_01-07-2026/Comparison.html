<!--
| Flexbox                | Grid                       |
| ---------------------- | -------------------------- |
| One-dimensional layout | Two-dimensional layout     |
| Works in row OR column | Works in rows AND columns  |
| Best for alignment     | Best for full page layouts |
| Content-based layout   | Layout-based design        |
-->


<!--important flex box properties
| Property        | Purpose                  |
| --------------- | ------------------------ |
| display:flex    | Creates flex container   |
| justify-content | Horizontal alignment     |
| align-items     | Vertical alignment       |
| flex-direction  | Row/column               |
| gap             | Space between items      |
| flex-wrap       | Moves items to next line |
-->
