Revise all layout concepts covered previously.

Display Property:
How an HTML element should appear on the webpage

It controls:

Whether element starts in new line
Whether width & height work
Whether elements stay side by side
Whether element is visible or hidden

types of display properties:

block:
A block element:
Takes full width
 Starts from new line

inline:
Stay in same line
Do not take full width

inline-block:Stay in same line
Width & height also work


none:Element becomes completely invisible.

It:
 Does not appear
 Does not take space
-->

<!--Position Property
static
relative
absolute
fixed
sticky

| Property   | Meaning                                          |
| ---------- | ------------------------------------------------ |
| `static`   | Default normal position                          |
| `relative` | Moves relative to original position              |
| `absolute` | Positioned relative to nearest positioned parent |
| `fixed`    | Fixed to browser window                          |
| `sticky`   | Sticks while scrolling                           |
-->

<!--Float:The float property moves an element:

Left side
Right side

and allows other content to wrap around it.

Clear: clear stops elements from wrapping around floated elements.
-->
<!--
| Float                    | Clear                    |
| ------------------------ | ------------------------ |
| Moves element left/right | Stops wrapping           |
| Allows text wrapping     | Pushes element below     |
| Used for alignment       | Used to fix float effect |
-->

<!--Flexbox:
What is Flexbox?

Flexbox is a CSS layout system used to:

Align elements
Create responsive layouts
Arrange items in rows or columns
Control spacing easily


Flex Container: Parent element becomes flex container.

Flex Items:Children inside flex container become flex items.

flex-direction: Controls direction of flex items.

justify-content : Controls horizontal alignment.

align-items : Controls vertical alignment.

align-content: Multiple rows exist
 flex-wrap is enabled

Controls spacing between rows.

flex-wrap:Controls whether items should move to next line.

gap: Creates spacing between flex items.

order:Changes item order visually.

flex-grow: Controls how much item should grow.

flex-shrink : Controls shrinking behavior.

flex-basis:Defines initial size of flex item.
-->

<!--
| Property        | Purpose                |
| --------------- | ---------------------- |
| display:flex    | Creates flex container |
| flex-direction  | Direction              |
| justify-content | Horizontal alignment   |
| align-items     | Vertical alignment     |
| flex-wrap       | Next line wrapping     |
| gap             | Space between items    |
| order           | Change item order      |
| flex-grow       | Grow size              |
| flex-shrink     | Shrink control         |
| flex-basis      | Initial size           |
-->

<!--CSS Grid:CSS Grid is a 2-dimensional layout system.

It controls:

Rows
Columns

at the same time.

Grid Container: 

Grid Items
grid-template-columns:Defines number and size of columns.

grid-template-rows:Defines row heights.

gap:Creates space between rows & columns.

grid-column:Makes item span multiple columns.

grid-row
justify-items:Controls horizontal alignment inside grid cells.

align-items:Controls vertical alignment inside cells.
-->

<!--
| Property              | Purpose                |
| --------------------- | ---------------------- |
| display:grid          | Create grid            |
| grid-template-columns | Create columns         |
| grid-template-rows    | Create rows            |
| gap                   | Space between products |
| grid-column           | Product spans columns  |
| grid-row              | Product spans rows     |
| justify-items         | Horizontal alignment   |
| align-items           | Vertical alignment     |
-->
