<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ways to Apply CSS</title>
    <link rel="stylesheet" href="./WaysToCss.css">
    <style>
        h1{
            color:yellowgreen;
        }

        h1{
            color: blue;
        }
        p{

            font-size: 18px;
        }
        body{
            background-color: lightseagreen;
        }
        button{
            background-color: red;
            color: white;
        }
        .card{
            border:2px solid black;
            width: 300px;
            padding: 20px;
            background-color: pink;
        }



    </style>
</head>
<body>
    <!--change text color-->
    <h1 style="color:blue;">welcome</h1>

    <!--multiple styles-->
    <p style="color:red; font-size: 20px;">
        Hello CSS
    </p>

    <!--button styling-->
    <button style="background-color: green;color: white; padding: 10px;"> submit</button>

    <!--notification-->
    <span style="
    background-color:red;
    color:white;
    padding:5px;
    border-radius:50%;
">
    5
</span>

     <!--internal css-->
     <!-- heading-->
     <h1>welcome</h1>

     <!--multiple elements-->
     <h1> css example</h1>
     <p>this is a program</p>

     <!--background with button-->

<p3>to the universe</p3>

</body>
</html>


<!--

//Inline CSS:

Inline CSS is written directly inside the HTML element using the style attribute.


Internal CSS:
Internal CSS is written inside the <style> tag within the <head> section of the HTML file.

External CSS:
External CSS is written in a separate .css file and linked to the HTML file.



Compare the advantages and use cases of each approach.
-->

<!--
| Feature     | Inline CSS     | Internal CSS     | External CSS         |
| ----------- | -------------- | ---------------- | -------------------- |
| Location    | Inside element | Inside `<style>` | Separate `.css` file |
| Reusable    | No             | Limited          | Yes                  |
| Maintenance | Difficult      | Medium           | Easy                 |
| Best For    | Quick styling  | Small projects   | Large projects       |
| Recommended | No              |              | yes                 |
-->
