//Understand the purpose and advantages of CSS.
What is CSS?

CSS (Cascading Style Sheets) is used to style and design web pages.
HTML creates the structure of a webpage, while CSS controls how the webpage looks.

*HTML → Creates heading, paragraph, button.
*CSS → Changes colors, fonts, spacing, layout, animations, etc.

//Purpose of CSS

The main purpose of CSS is to improve the appearance and layout of web pages.
