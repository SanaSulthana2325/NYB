<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Assignment</title>
    <link rel="stylesheet" href="./MiniAssignment.css">
    <style>

            *{
                margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* BODY STYLING */
        body{

            font-family:Arial, sans-serif;

            background-color:#f4f4f4;

            background-image:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");

            background-repeat:no-repeat;

            background-size:cover;

            background-position:center;

            min-height:100vh;
        }

        /* ELEMENT SELECTOR */
        h1{
            text-align:center;
            color:white;
            margin-top:20px;
        }

        /* CLASS SELECTOR */
        .container{

            width:90%;

            max-width:1200px;

            margin:30px auto;

            display:flex;

            flex-wrap:wrap;

            gap:20px;
        }

        /* ID SELECTOR */
        #main-card{

            background-color:white;

            width:300px;

            min-height:300px;

            padding:20px;

            border:5px solid blue;

            border-radius:20px;
        }

        /* GROUP SELECTOR */
        h2,p{
            margin-bottom:15px;
        }

        /* ATTRIBUTE SELECTOR */
        input[type="text"]{

            width:100%;

            padding:10px;

            border:2px solid gray;

            border-radius:10px;
        }

        /* HOVER PSEUDO CLASS */
        button:hover{
            background-color:darkblue;
        }

        /* BUTTON STYLING */
        button{

            margin-top:15px;

            width:100%;

            padding:10px;

            border:none;

            border-radius:10px;

            background-color:blue;

            color:white;

            cursor:pointer;
        }

        /* ANOTHER CARD */
        .card{

            flex:1;

            min-width:250px;

            min-height:250px;

            background-color:rgba(255,255,255,0.9);

            border:4px dashed green;

            border-radius:15px;

            padding:20px;
        }

        /* IMAGE STYLING */
        .card img{

            width:100%;

            height:200px;

            object-fit:cover;

            border-radius:10px;
        }

        /* MEDIA QUERY FOR RESPONSIVENESS */
        @media(max-width:768px){

            .container{
                flex-direction:column;
            }

            #main-card{
                width:100%;
            }
        }


    </style>
</head>
<body>
    <h1>Responsive CSS Webpage</h1>

    <div class="container">

        <div id="main-card">

            <h2>Login Form</h2>

            <p>This is a responsive card.</p>

            <ul>
                <li>Border Styles</li>
                <li>Rounded Corners</li>
                <li>Responsive Design</li>
            </ul>

            <input type="text" placeholder="Enter Username">

            <button>Login</button>

        </div>

        <div class="card">

            <h2>Nature Card</h2>

            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Nature">

            <p>
                Responsive card with image.
            </p>

        </div>

    </div>




    
</body>
</html>
