<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Task</title>
    <link rel="stylesheet" href="./Gridtask.css">
    <style>
        .container{
            display: grid;
        }
        .container1{
             display: grid;
             grid-template-columns: 800px 800px 800px;/* control width of column*/
        }
        .container2{
            display: grid;
            grid-template-rows: 100px 200px;/* control height of rows*/
        }
        .container3{
            display: grid;
            grid-template-columns: repeat(2,3fr);
            gap:20px;
        }
        .container4{
            display: grid;
            grid-template-columns: repeat(3,500px);
            gap:20px;
            width: 900px;
        }
        .box1{
            grid-column: 1/3;
        }
        .container5{
            display: grid;
            grid-template-columns: repeat(3,3fr);
            gap:20px
        }
        .box1{
            grid-row: 2/3;
        }
        .container6{
         display:grid;

         justify-items:center;
         }
         .container{
         display:grid;

         align-items:center;
         }


    </style>
</head>
<body>
    
    <!--container-->
    <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
     </div>
     <br>
     <br>
     <hr>
     <!--grid-template-columns-->
     <div class="container1">
    <div class="box1">1</div>
    <div class="box1">2</div>
    <div class="box1">3</div>
     </div>
     <br>
     <br>
     <br>
     <hr>
     <!--grid-template-rows-->
     <div class="container2">
    <div class="box2">1</div>
    <div class="box2">2</div>
    <div class="box2">3</div>
     </div>
     <br>
     <br>
     <hr>
     <!--gap-->
     <div class="container3">
    <div class="box3">1</div>
    <div class="box3">2</div>
    <div class="box3">3</div>
     </div>
     <br>
     <br>
     <hr>
     <!--grid column-->
     <div class="container4">
    <div class="box4">1</div>
    <div class="box4">2</div>
    <div class="box4">3</div>
    <div class="box4">3</div>
    <div class="box4">3</div>
     </div>
     <br>
     <br>
     <hr>
     <!--grid row-->
     <div class="container5">
    <div class="box5">1</div>
    <div class="box5">2</div>
    <div class="box5">3</div>
    <div class="box5">4</div>
    <div class="box5">5</div>
     </div>
     <br>
     <br>
     <hr>
     <!--justify content-->
     <div class="container6">
    <div class="box6">1</div>
    <div class="box6">2</div>
    <div class="box6">3</div>
     </div>
     <br>
     <hr>
     <!--align items-->
     <div class="container7">
     <div class="box7">1</div>
     <div class="box7">2</div>
     <div class="box7">3</div>
     </div>
    
     <br>
    <br>
    <br>
    <hr>
    <div class="dashboard">
        <!--side bar-->
        <div class="sidebar">
            <h2>Dashboard</h2>
            <ul>
                <li>home</li>
                <li>analytics</li>
                <li>orders</li>
                <li>setting</li>
            </ul>
        </div>
        <!--header-->
        <div class="header">
            <h1> welcome admine</h1>
        </div>
        <!--cards section-->
        <div class="chart">
            analytics chart
        </div>
        <!--Table section-->
        <div class="table">
            recent transaction
        </div>
    </div>
    
    
</body>
</html>

<!--
Create Grid Containers and Grid Items.
Practice:
grid-template-columns: side bar
grid-template-rows: creates row height
grid-column: control span column
grid-row: side bar span row
gap: add spacing between rows and columns
justify-items: horizontally
align-items: vertically
place-items: shortcut for justify and align item

Create a responsive dashboard layout using CSS Grid.
-->
