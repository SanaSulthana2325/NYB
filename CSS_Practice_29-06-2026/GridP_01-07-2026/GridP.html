<!--practice css grid layout-->

<!--CSS Grid Layout is mainly used for creating rows and columns in webpages.
It is very useful for:

Product galleries
Dashboards
Photo layouts
Website sections
Admin panels
-->
<!--CSS Grid:CSS Grid is a 2-dimensional layout system.

It controls:

Rows
Columns

at the same time.

Grid Container: 

Grid Items
grid-template-columns:Defines number and size of columns.

grid-template-rows:Defines row heights.

gap:Creates space between rows & columns.

grid-column:Makes item span multiple columns.

grid-row
justify-items:Controls horizontal alignment inside grid cells.

align-items:Controls vertical alignment inside cells.
-->

<!--
| Property              | Purpose                |
| --------------------- | ---------------------- |
| display:grid          | Create grid            |
| grid-template-columns | Create columns         |
| grid-template-rows    | Create rows            |
| gap                   | Space between products |
| grid-column           | Product spans columns  |
| grid-row              | Product spans rows     |
| justify-items         | Horizontal alignment   |
| align-items           | Vertical alignment     |
-->

box-sizing: that controls how the total width and height of an element are calculated-->
